[Heltec_lora32_v3]
extends = esp32_base
board = esp32-s3-devkitc-1
build_flags =
  ${esp32_base.build_flags}
  ${sensor_base.build_flags}
  -I${PROJECT_LIBDEPS_DIR}/${PIOENV}/MeshCore/variants/heltec_v3
  -D HELTEC_LORA_V3
  -D ESP32_CPU_FREQ=80
  -D P_LORA_DIO_1=14
  -D P_LORA_NSS=8
  -D P_LORA_RESET=RADIOLIB_NC
  -D P_LORA_BUSY=13
  -D P_LORA_SCLK=9
  -D P_LORA_MISO=11
  -D P_LORA_MOSI=10
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D P_LORA_TX_LED=35
  -D PIN_BOARD_SDA=17
  -D PIN_BOARD_SCL=18
  -D PIN_USER_BTN=0
  -D PIN_VEXT_EN=36
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D PIN_GPS_RX=47
  -D PIN_GPS_TX=48
  -D PIN_GPS_EN=26
  -D MC_VARIANT=heltec_v3
build_src_filter =
  ${esp32_base.build_src_filter}
lib_deps =
  ${esp32_base.lib_deps}
  ${sensor_base.lib_deps}


; This is a regular Companion node that supports Serial/USB, BLE and WiFi interfaces.
[env:Heltec_v3_companion_radio]
extends = Heltec_lora32_v3
build_flags =
  ${Heltec_lora32_v3.build_flags}
  -I src/ui-aio
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D DISPLAY_CLASS=SSD1306Display
  -D BLE_PIN_CODE=123456   ; replace with your desired static BLE PIN code, or leave undefined to generate a random one at startup (which will be shown on the display)
  ; -D BLE_DEBUG_LOGGING=1
  -D AUTO_SHUTDOWN_MILLIVOLTS=3400
  -D OFFLINE_QUEUE_SIZE=256
  -D WIFI_SSID='"Guest"'   ; replace with your WiFi SSID.
  -D WIFI_PWD='""'     ; replace with your WiFi password
  ; -D WIFI_DEBUG_LOGGING=1   ;
  ; -D MESH_PACKET_LOGGING=1
  ; -D MESH_DEBUG=1
build_src_filter =
  ${Heltec_lora32_v3.build_src_filter}
lib_deps =
  ${Heltec_lora32_v3.lib_deps}
  adafruit/Adafruit GFX Library @ ^1.12.1
  densaugeo/base64 @ ~1.4.0

; This is an observer Companion node that supports Serial/USB, BLE and WiFi interfaces.
[env:Heltec_v3_companion_observer]
extends = env:Heltec_v3_companion_radio
build_flags =
  ${env:Heltec_v3_companion_radio.build_flags}
  -D MESH_PACKET_LOGGING=1
  -D MESH_DEBUG=1
